<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Charger un GEDCOM</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <h1>🧬 Importer votre fichier GEDCOM</h1>
    <input type="file" id="gedFile" accept=".ged">
    <button id="btnImport">Continuer</button>
    <p id="status"></p>

    <script>
        document.getElementById("btnImport").addEventListener("click", async () => {
            const fileInput = document.getElementById("gedFile");
            const file = fileInput.files[0];
            const status = document.getElementById("status");

            if (!file) {
                alert("Choisissez un fichier GEDCOM");
                return;
            }

            const sessionId = crypto.randomUUID();
            const reader = new FileReader();
            
            reader.onload = async (e) => {
                try {
                    status.innerText = "Parsing local...";
                    const lines = e.target.result.split(/\r?\n/);
                    const individuals = [];
                    
                    for (let line of lines) {
                        if (line.startsWith("1 NAME")) {
                            individuals.push({ name: line.substring(7).replace(/\//g, "").trim() });
                        }
                    }

                    if (individuals.length === 0) {
                        alert("Aucun individu trouvé dans ce fichier GEDCOM.");
                        return;
                    }

                    // VITESSE : Batch de 5000 + exécution parallèle par paquets de 5[cite: 3]
                    const batchSize = 5000;
                    const tasks = [];
                    
                    for (let i = 0; i < individuals.length; i += batchSize) {
                        const batch = individuals.slice(i, i + batchSize);
                        
                        // Création de la tâche d'envoi parallèle[cite: 3]
                        const task = (async () => {
                            const blob = new Blob([JSON.stringify({ 
                                sessionId: sessionId, 
                                individuals: batch,
                                isFirstBatch: (i === 0) 
                            })]);
                            const compressedStream = blob.stream().pipeThrough(new CompressionStream("gzip"));
                            const compressedBlob = await new Response(compressedStream).blob();

                            const response = await fetch("/api/save_data", {
                                method: "POST",
                                headers: { 
                                    "Content-Type": "application/json",
                                    "Content-Encoding": "gzip" 
                                },
                                body: compressedBlob
                            });
                            
                            // NOUVELLE VÉRIFICATION : On vérifie le code HTTP ET le contenu JSON
                            if (!response.ok) {
                                throw new Error(`Erreur réseau (Code ${response.status}) au lot ${i}`);
                            }
                            
                            const data = await response.json();
                            if (!data.success) {
                                throw new Error(`Erreur serveur au lot ${i} : ${data.error || 'Erreur inconnue'}`);
                            }
                        })();

                        tasks.push(task);
                        status.innerText = `Envoi parallèle : ${i + batch.length} / ${individuals.length}`;

                        // On limite à 5 requêtes simultanées pour ne pas saturer Vercel[cite: 3]
                        if (tasks.length >= 5) {
                            await Promise.all(tasks);
                            tasks.length = 0;
                        }
                    }
                    await Promise.all(tasks); // Finalisation des derniers lots[cite: 3]

                    status.innerText = "Terminé ! Redirection...";
                    window.location.href = "/menu?sessionId=" + sessionId;
                } catch (err) {
                    console.error("Détail de l'erreur :", err);
                    status.innerText = "";
                    alert("Erreur de traitement : " + err.message);
                }
            };

            reader.readAsText(file);
        });
    </script>
</body>
</html>
