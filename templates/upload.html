<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Charger un GEDCOM</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <h1>🧬 Importer votre fichier GEDCOM</h1>
    <input type="file" id="gedFile" accept=".ged">
    <button onclick="importGed()">Continuer</button>
    <p id="status"></p>

    <!-- Import de la bibliothèque de parsing GEDCOM -->
    <script type="module">
        import { parseGedcom } from 'https://ga.jspm.io/npm:gedcom-js@1.0.0/dist/gedcom.js';

        window.importGed = async function () {
            const fileInput = document.getElementById("gedFile");
            const file = fileInput.files[0];
            const status = document.getElementById("status");

            if (!file) {
                alert("Choisissez un fichier GEDCOM");
                return;
            }

            const reader = new FileReader();
            
            reader.onload = async (e) => {
                try {
                    status.innerText = "Parsing du GEDCOM (local)...";
                    
                    // Parsing local (ne sature pas le serveur)
                    const gedcomData = e.target.result;
                    const data = parseGedcom(gedcomData);
                    const individuals = data.filter(item => item.tag === 'INDI');

                    status.innerText = "Envoi des données au serveur...";

                    // Envoi des données extraites à votre route Flask
                    const response = await fetch("/api/save_data", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ individuals: individuals })
                    });

                    if (response.ok) {
                        status.innerText = "GEDCOM chargé.";
                        window.location.href = "/menu";
                    } else {
                        throw new Error("Erreur lors de l'envoi au serveur");
                    }

                } catch (err) {
                    console.error(err);
                    status.innerText = "";
                    alert("Erreur lors du traitement : " + err.message);
                }
            };

            reader.readAsText(file);
        };
    </script>
</body>
</html>
