<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Charger un GEDCOM</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <h1>🧬 Importer votre fichier GEDCOM</h1>
    <input type="file" id="gedFile" accept=".ged">
    <button id="btnImport">Continuer</button>
    <p id="status"></p>

        <script>
        // Ajout d'un écouteur sur le bouton sans dépendance externe
        document.getElementById("btnImport").addEventListener("click", async () => {
            const fileInput = document.getElementById("gedFile");
            const file = fileInput.files[0];
            const status = document.getElementById("status");

            if (!file) {
                alert("Choisissez un fichier GEDCOM");
                return;
            }

            const reader = new FileReader();
            
            reader.onload = async (e) => {
                try {
                    status.innerText = "Traitement local en cours...";
                    const content = e.target.result;
                    
                    // Parsing manuel simplifié des lignes GEDCOM pour extraire les noms
                    // Cela remplace la bibliothèque gedcom-js qui posait problème
                    const lines = content.split(/\r?\n/);
                    const individuals = [];
                    
                    let currentName = null;
                    for (let line of lines) {
                        if (line.startsWith("1 NAME")) {
                            currentName = line.substring(7).replace(/\//g, "").trim();
                            individuals.push({ name: currentName });
                        }
                    }

                    status.innerText = `Extraction de ${individuals.length} personnes. Envoi...`;

                    const response = await fetch("/api/save_data", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ individuals: individuals })
                    });

                    if (response.ok) {
                        status.innerText = "Terminé !";
                        window.location.href = "/menu";
                    } else {
                        throw new Error("Erreur lors de l'envoi au serveur.");
                    }
                } catch (err) {
                    console.error(err);
                    status.innerText = "";
                    alert("Erreur de traitement : " + err.message);
                }
            };

            reader.readAsText(file);
        });
    </script>
</body>
</html>
