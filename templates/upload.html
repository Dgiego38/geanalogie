<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <title>Importer un GEDCOM</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <div class="upload-container">

        <div class="upload-card">

            <h1>🧬 Généalogie ADN</h1>

            <p>
                Sélectionnez votre fichier GEDCOM
            </p>

            <input
                type="file"
                id="gedFile"
                accept=".ged"
            >

            <br><br>

            <button
                class="btn-primary"
                onclick="importGed()">

                Continuer

            </button>

            <br><br>

            <p id="status"></p>

        </div>

    </div>

    <script>

        function openDB() {

            return new Promise((resolve, reject) => {

                const request =
                    indexedDB.open(
                        "GenealogieDB",
                        1
                    );

                request.onupgradeneeded =
                    function(event) {

                        const db =
                            event.target.result;

                        if (
                            !db.objectStoreNames.contains(
                                "files"
                            )
                        ) {

                            db.createObjectStore(
                                "files"
                            );
                        }
                    };

                request.onsuccess =
                    () => resolve(
                        request.result
                    );

                request.onerror =
                    () => reject(
                        request.error
                    );
            });
        }

        async function importGed() {

            const file =
                document.getElementById(
                    "gedFile"
                ).files[0];

            if (!file) {

                alert(
                    "Choisissez un fichier GEDCOM"
                );

                return;
            }

            document.getElementById(
                "status"
            ).innerText =
                "Stockage du GEDCOM...";

            try {

                const db =
                    await openDB();

                const transaction =
                    db.transaction(
                        ["files"],
                        "readwrite"
                    );

                const store =
                    transaction.objectStore(
                        "files"
                    );

                store.put(
                    file,
                    "gedcom"
                );

                transaction.oncomplete =
                    function() {

                        localStorage.setItem(
                            "ged_loaded",
                            "true"
                        );

                        localStorage.setItem(
                            "ged_name",
                            file.name
                        );

                        document.getElementById(
                            "status"
                        ).innerText =
                            "GEDCOM enregistré ✅";

                        setTimeout(() => {

                            window.location.href =
                                "/menu";

                        }, 500);
                    };

                transaction.onerror =
                    function() {

                        alert(
                            "Erreur lors du stockage"
                        );
                    };

            } catch (err) {

                console.error(err);

                alert(
                    "Impossible d'enregistrer le fichier."
                );
            }
        }

    </script>

</body>

</html>
