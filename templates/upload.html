<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Charger un GEDCOM</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <h1>🧬 Importer votre fichier GEDCOM</h1>
    <input type="file" id="gedFile" accept=".ged">
    <button id="btnImport">Continuer</button>
    <p id="status"></p>

    <script>
        document.getElementById("btnImport").addEventListener("click", async () => {
            const fileInput = document.getElementById("gedFile");
            const file = fileInput.files[0];
            const status = document.getElementById("status");

            if (!file) {
                alert("Choisissez un fichier GEDCOM");
                return;
            }

            // Génération d'un ID de session unique
            const sessionId = crypto.randomUUID();

            const reader = new FileReader();
            
            reader.onload = async (e) => {
                try {
                    status.innerText = "Parsing local...";
                    const lines = e.target.result.split(/\r?\n/);
                    const individuals = [];
                    
                    for (let line of lines) {
                        if (line.startsWith("1 NAME")) {
                            individuals.push({ name: line.substring(7).replace(/\//g, "").trim() });
                        }
                    }

                    // Envoi par lots (batches) pour éviter l'erreur 413
                    const batchSize = 200;
                    for (let i = 0; i < individuals.length; i += batchSize) {
                        const batch = individuals.slice(i, i + batchSize);
                        
                        status.innerText = `Envoi du lot ${i / batchSize + 1}... (${i + batch.length}/${individuals.length})`;

                        const response = await fetch("/api/save_data", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ 
                                sessionId: sessionId, 
                                individuals: batch,
                                isFirstBatch: (i === 0) // Indique au serveur de nettoyer l'ancienne session
                            })
                        });

                        if (!response.ok) throw new Error("Erreur serveur au lot " + i);
                    }

                    status.innerText = "Terminé ! Redirection...";
                    window.location.href = "/menu?sessionId=" + sessionId;
                } catch (err) {
                    console.error(err);
                    status.innerText = "";
                    alert("Erreur de traitement : " + err.message);
                }
            };

            reader.readAsText(file);
        });
    </script>
</body>
</html>
