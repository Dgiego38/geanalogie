<script>

async function importGed() {

    const file =
        document.getElementById(
            "gedFile"
        ).files[0];

    if (!file) {

        alert(
            "Choisissez un fichier GEDCOM"
        );

        return;
    }

    document.getElementById(
        "status"
    ).innerText =
        "Compression du fichier...";

    try {

        const buffer =
            await file.arrayBuffer();

        const compressed =
            pako.gzip(
                new Uint8Array(buffer)
            );

        console.log(
            "Taille originale :",
            file.size
        );

        console.log(
            "Taille compressée :",
            compressed.length
        );

        const blob =
            new Blob(
                [compressed],
                {
                    type:
                        "application/gzip"
                }
            );

        const formData =
            new FormData();

        formData.append(
            "file",
            blob,
            file.name + ".gz"
        );

        document.getElementById(
            "status"
        ).innerText =
            "Envoi du fichier...";

        const response =
            await fetch(
                "/upload_ged",
                {
                    method: "POST",
                    body: formData
                }
            );

        const result =
            await response.json();

        if (result.success) {

            document.getElementById(
                "status"
            ).innerText =
                "GEDCOM chargé.";

            window.location.href =
                "/menu";

        } else {

            alert(
                result.message ||
                "Erreur lors du chargement"
            );
        }

    } catch (e) {

        console.error(e);

        alert(
            "Erreur de communication avec le serveur."
        );
    }
}

</script>
