<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Charger un GEDCOM</title>
</head>
<body>
    <h1>🧬 Importer votre fichier GEDCOM</h1>
    <input type="file" id="gedFile" accept=".ged">
    <button id="btnImport">Continuer</button>
    <p id="status"></p>

    <script>
        document.getElementById("btnImport").addEventListener("click", async () => {
            const fileInput = document.getElementById("gedFile");
            const file = fileInput.files[0];
            const status = document.getElementById("status");
            if (!file) return alert("Choisissez un fichier GEDCOM");

            const sessionId = crypto.randomUUID(); 
            const reader = new FileReader();

            reader.onload = async (e) => {
                status.innerText = "Parsing local...";
                const lines = e.target.result.split(/\r?\n/);
                const individuals = lines
                    .filter(line => line.startsWith("1 NAME"))
                    .map(line => ({ 
                        // Correction : remplacement du slash par un espace et nettoyage des espaces doubles
                        name: line.substring(7).replace(/\//g, " ").replace(/\s+/g, " ").trim() 
                    }));

                const batchSize = 8000;
                const tasks = [];
                for (let i = 0; i < individuals.length; i += batchSize) {
                    const batch = individuals.slice(i, i + batchSize);
                    const task = (async () => {
                        const blob = new Blob([JSON.stringify({ sessionId, individuals: batch, isFirstBatch: (i === 0) })]);
                        const compressedStream = blob.stream().pipeThrough(new CompressionStream("gzip"));
                        const response = await fetch("/api/save_data", {
                            method: "POST",
                            headers: { "Content-Type": "application/json", "Content-Encoding": "gzip" },
                            body: await new Response(compressedStream).blob()
                        });
                        if (!response.ok) throw new Error("Erreur lot " + i);
                    })();
                    tasks.push(task);
                    if (tasks.length >= 15) { await Promise.all(tasks); tasks.length = 0; }
                }
                await Promise.all(tasks);
                window.location.href = "/menu?sessionId=" + sessionId;
            };
            reader.readAsText(file);
        });
    </script>
</body>
</html>
