<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Charger un GEDCOM</title>

    {{ url_for('static', filename='css/style.css') }}
</head>

<body>

    <h1>🧬 Importer votre fichier GEDCOM</h1>

    <input type="file" id="gedFile" accept=".ged">

    <button onclick="importGed()">
        Continuer
    </button>

    <p id="status"></p>

    <script type="module">

        import { upload } from "https://esm.sh/@vercel/blob/client";

        window.importGed = async function () {

            const file = document.getElementById(
                "gedFile"
            ).files[0];

            if (!file) {

                alert(
                    "Choisissez un fichier GEDCOM"
                );

                return;
            }

            try {

                document.getElementById(
                    "status"
                ).innerText =
                    "Upload vers Blob...";

                const blob = await upload(
                    file.name,
                    file,
                    {
                        access: "public",
                        handleUploadUrl:
                            "/api/upload"
                    }
                );

                console.log(
                    "Blob URL :",
                    blob.url
                );

                document.getElementById(
                    "status"
                ).innerText =
                    "Traitement du GEDCOM...";

                const response =
                    await fetch(
                        "/process_blob",
                        {
                            method: "POST",
                            headers: {
                                "Content-Type":
                                    "application/json"
                            },
                            body: JSON.stringify({
                                url:
                                    blob.url
                            })
                        }
                    );

                const result =
                    await response.json();

                if (result.success) {

                    document.getElementById(
                        "status"
                    ).innerText =
                        "GEDCOM chargé.";

                    window.location.href =
                        "/menu";

                } else {

                    alert(
                        result.message ||
                        "Erreur lors du traitement"
                    );
                }

            } catch (e) {

                console.error(e);

                alert(
                    "Erreur de communication avec le serveur."
                );
            }
        };

    </script>

</body>

</html>
