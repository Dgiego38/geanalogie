<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Charger un GEDCOM</title>

    {{ url_for('static', filename='css/style.css') }}
</head>

<body>

    <h1>🧬 Importer votre fichier GEDCOM</h1>

    <input type="file" id="gedFile" accept=".ged">

    <button onclick="importGed()">
        Continuer
    </button>

    <p id="status"></p>

    <script>

    async function importGed() {

        const file =
            document.getElementById(
                "gedFile"
            ).files[0];

        if (!file) {

            alert(
                "Choisissez un fichier GEDCOM"
            );

            return;
        }

        document.getElementById(
            "status"
        ).innerText =
            "Upload vers Blob...";

        try {

            const response =
                await fetch(
                    "/api/upload",
                    {
                        method: "POST",
                        headers: {
                            "content-type":
                                file.type ||
                                "application/octet-stream"
                        },
                        body: file
                    }
                );

            const blob =
                await response.json();

            document.getElementById(
                "status"
            ).innerText =
                "Traitement du GEDCOM...";

            const processResponse =
                await fetch(
                    "/process_blob",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type":
                                "application/json"
                        },
                        body: JSON.stringify({
                            url: blob.url
                        })
                    }
                );

            const result =
                await processResponse.json();

            if (result.success) {

                document.getElementById(
                    "status"
                ).innerText =
                    "GEDCOM chargé.";

                window.location.href =
                    "/menu";

            } else {

                alert(
                    result.message ||
                    "Erreur"
                );
            }

        } catch (e) {

            console.error(e);

            alert(
                "Erreur de communication avec le serveur."
            );
        }
    }

    </script>

</body>

</html>
