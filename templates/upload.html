<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Importer GEDCOM</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #E9EDF2; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 400px; text-align: center; }
        
        h1 { font-size: 24px; color: #1a1a1a; margin-bottom: 25px; }
        
        /* Style des boutons pour qu'ils soient beaux */
        .btn { background: #007aff; color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: 500; transition: background 0.2s; width: 100%; margin-top: 10px; }
        .btn:hover { background: #005bb5; }
        .btn-secondary { background: white; border: 1px solid #d1d1d6; color: #333; }
        .btn-secondary:hover { background: #f5f5f7; }
        
        /* Cacher l'input fichier moche, styliser le label */
        #gedFile { display: none; }
        .file-label { display: block; margin: 20px 0; color: #666; font-size: 14px; }
        
        .help-link { font-size: 13px; color: #007aff; text-decoration: none; margin-top: 15px; display: block; }
        
        /* Barre de progression */
        #progress-container { width: 100%; background: #eee; height: 8px; border-radius: 4px; margin-top: 20px; display: none; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #007aff; transition: width 0.3s; }
        #status-text { margin-top: 10px; font-size: 13px; color: #555; }
    </style>
</head>
<body>

<div class="card">
    <h1>🧬 Import GEDCOM</h1>
    
    <!-- Input invisible, bouton joli -->
    <input type="file" id="gedFile" accept=".ged">
    <button class="btn btn-secondary" onclick="document.getElementById('gedFile').click()">Choisir un fichier</button>
    <div id="fileName" style="font-size: 12px; color: #888; margin: 10px 0;">Aucun fichier choisi</div>
    
    <a href="https://assistance.filae.com/portal/fr/kb/articles/comment-exporter-un-arbre" class="help-link">Où trouver son fichier GEDCOM ?</a>
    
    <button id="btnImport" class="btn" style="display:none;">Continuer</button>

    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>
    <div id="status-text"></div>
</div>

<script>
    const fileInput = document.getElementById('gedFile');
    const fileName = document.getElementById('fileName');
    const btnImport = document.getElementById('btnImport');
    const bar = document.getElementById('progress-bar');
    const progressContainer = document.getElementById('progress-container');
    const statusText = document.getElementById('status-text');

    // Afficher le nom du fichier choisi
    fileInput.addEventListener('change', () => {
        fileName.innerText = fileInput.files[0].name;
        btnImport.style.display = 'block';
    });

    btnImport.addEventListener("click", async () => {
        const file = fileInput.files[0];
        if (!file) return;

        // UI Chargement
        btnImport.style.display = 'none';
        progressContainer.style.display = 'block';
        statusText.innerText = "Lecture du fichier...";
        bar.style.width = "20%";

        const sessionId = crypto.randomUUID();
        const reader = new FileReader();

        reader.onload = async (e) => {
            statusText.innerText = "Analyse et compression...";
            bar.style.width = "50%";

            const lines = e.target.result.split(/\r?\n/);
            const individuals = [], families = [];
            let currentObj = null;

            lines.forEach(line => {
                const parts = line.split(" ");
                const level = parts[0], tag = parts[1], val = parts.slice(2).join(" ");
                if (level === "0" && val === "INDI") currentObj = { id: tag, type: "INDI", name: "Inconnu" };
                else if (level === "0" && val === "FAM") currentObj = { id: tag, type: "FAM", chil: [] };
                else if (currentObj) {
                    if (level === "1" && tag === "NAME") currentObj.name = val.replace(/\//g, "");
                    if (currentObj.type === "FAM") {
                        if (["HUSB", "WIFE"].includes(tag)) currentObj[tag.toLowerCase()] = parts[2];
                        if (tag === "CHIL") currentObj.chil.push(parts[2]);
                    }
                }
                if (level === "0" && currentObj) (currentObj.type === "INDI" ? individuals : families).push(currentObj);
            });

            statusText.innerText = "Envoi sécurisé...";
            bar.style.width = "80%";

            const blob = new Blob([JSON.stringify({sessionId, individuals, families})]);
            const response = await fetch("/api/save_data", { 
                method: "POST", 
                body: await new Response(blob.stream().pipeThrough(new CompressionStream("gzip"))).blob() 
            });

            if (response.ok) {
                statusText.innerText = "Prêt ! Redirection...";
                bar.style.width = "100%";
                window.location.href = "/menu?sessionId=" + sessionId;
            }
        };
        reader.readAsText(file);
    });
</script>

</body>
</html>
