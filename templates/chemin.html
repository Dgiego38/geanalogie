<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Recherche chemin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <script>
        // Récupération sécurisée du sessionId
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('sessionId');
        
        // Redirection si l'utilisateur tente d'accéder sans session valide
        if (!sessionId) { 
            window.location.href = "/"; 
        }
    </script>

    <div class="menu">
        <h2>🧬 Généalogie</h2>
        <a href="/menu?sessionId={{ session_id }}"><button>Retour au Menu</button></a>
    </div>

    <div class="contenu">
        <h1>Recherche de chemin</h1>
        
        <h3>Personne 1</h3>
        <input id="p1" placeholder="Tape un nom...">
        <div id="suggestions1"></div>

        <h3>Personne 2</h3>
        <input id="p2" placeholder="Tape un nom...">
        <div id="suggestions2"></div>

        <br>
        <button class="btn-primary" onclick="chercher()">Rechercher le lien</button>

        <!-- Conteneur qui sera peuplé par tree.js avec la nouvelle structure .genealogy-tree -->
        <div id="tree"></div>
    </div>

    <!-- Scripts chargés avec les bons chemins Flask -->
    <script src="{{ url_for('static', filename='js/tree.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
